<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CodeNest — Launch Your Coding Career</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Plus+Jakarta+Sans:wght@500;700;800&family=Instrument+Serif:ital@0;1&display=swap"
  rel="stylesheet"
/>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: '#5ed29c',
          ink: '#070b0a',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
          serif: ['"Instrument Serif"', 'Georgia', 'serif'],
        },
      },
    },
  };
</script>

<style>
  html, body {
    background: #070b0a;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Liquid Glass Card */
  .liquid-glass {
    position: relative;
    width: 200px;
    height: 200px;
    border-radius: 18px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.01);
    background-blend-mode: luminosity;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
  }

  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    padding: 1.4px;
    border-radius: inherit;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.55) 0%,
      rgba(255, 255, 255, 0.18) 35%,
      rgba(255, 255, 255, 0.04) 70%,
      rgba(255, 255, 255, 0.22) 100%
    );
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* Central glow */
  .central-glow {
    filter: blur(25px);
  }

  /* Subtle grain on hero (optional polish) */
  .grain::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* Hide video controls everywhere */
  video::-webkit-media-controls { display: none !important; }
</style>
</head>
<body class="font-sans">
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "hls.js": "https://esm.sh/hls.js@1.5.17",
        "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import Hls from 'hls.js';
    import { ArrowRight, Menu, X } from 'lucide-react';

    const NAV_ITEMS = ['Projects', 'Blog', 'About', 'Resume'];
    const HLS_SRC =
      'https://stream.mux.com/tLkHO1qZoaaQOUeVWo8hEBeGQfySP02EPS02BmnNFyXys.m3u8';

    function Logo({ className = '' }) {
      return (
        <a
          href="#"
          className={`flex items-center gap-2 text-white font-jakarta font-bold tracking-tight ${className}`}
          aria-label="CodeNest home"
        >
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M4 7L12 3L20 7V17L12 21L4 17V7Z"
              stroke="currentColor"
              strokeWidth="1.4"
              strokeLinejoin="round"
            />
            <path
              d="M8 10L12 12L16 10"
              stroke="currentColor"
              strokeWidth="1.4"
              strokeLinecap="round"
              strokeLinejoin="round"
            />
            <path
              d="M12 12V17"
              stroke="currentColor"
              strokeWidth="1.4"
              strokeLinecap="round"
            />
          </svg>
          <span className="text-[15px]">CodeNest</span>
        </a>
      );
    }

    function NavList({ orientation = 'horizontal', onItemClick }) {
      const base = 'text-white/85 hover:text-brand transition-colors duration-200';
      const layout =
        orientation === 'horizontal'
          ? 'hidden md:flex items-center gap-8 text-[16px] font-medium tracking-wide uppercase'
          : 'flex flex-col items-center gap-8 text-3xl font-medium tracking-wide uppercase';
      return (
        <ul className={layout}>
          {NAV_ITEMS.map((label) => (
            <li key={label}>
              <a href="#" onClick={onItemClick} className={base}>
                {label}
              </a>
            </li>
          ))}
        </ul>
      );
    }

    function Header({ onOpenMenu }) {
      return (
        <header className="absolute top-0 inset-x-0 z-30">
          <nav className="max-w-7xl mx-auto flex items-center justify-between px-6 md:px-10 py-6">
            <Logo />
            <NavList orientation="horizontal" />
            <button
              type="button"
              className="md:hidden text-white p-2 -mr-2"
              onClick={onOpenMenu}
              aria-label="Open menu"
            >
              <Menu size={24} />
            </button>
          </nav>
        </header>
      );
    }

    function MobileMenu({ open, onClose }) {
      useEffect(() => {
        if (!open) return;
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => {
          document.body.style.overflow = prev;
        };
      }, [open]);

      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 bg-ink/95 backdrop-blur-md flex flex-col">
          <div className="flex items-center justify-between px-6 py-6">
            <Logo />
            <button
              type="button"
              onClick={onClose}
              aria-label="Close menu"
              className="text-white p-2 -mr-2"
            >
              <X size={28} />
            </button>
          </div>
          <div className="flex-1 flex items-center justify-center">
            <NavList orientation="vertical" onItemClick={onClose} />
          </div>
        </div>
      );
    }

    function GridLines() {
      return (
        <div className="hidden md:block absolute inset-0 z-[5] pointer-events-none">
          <div className="absolute top-0 bottom-0 left-1/4 w-px bg-white/10" />
          <div className="absolute top-0 bottom-0 left-1/2 w-px bg-white/10" />
          <div className="absolute top-0 bottom-0 left-3/4 w-px bg-white/10" />
        </div>
      );
    }

    function CentralGlow() {
      return (
        <svg
          className="central-glow absolute -top-24 left-1/2 -translate-x-1/2 w-[1100px] max-w-none h-[520px] pointer-events-none z-[3]"
          viewBox="0 0 1100 520"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <defs>
            <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#5ed29c" stopOpacity="0.85" />
              <stop offset="55%" stopColor="#1d6f54" stopOpacity="0.55" />
              <stop offset="100%" stopColor="#0a1f17" stopOpacity="0" />
            </radialGradient>
          </defs>
          <ellipse cx="550" cy="180" rx="480" ry="120" fill="url(#cyanGlow)" />
        </svg>
      );
    }

    function GlassCard() {
      return (
        <div className="liquid-glass translate-y-[-50px] z-20">
          <div className="relative h-full w-full p-5 flex flex-col justify-between">
            <span className="text-[14px] font-jakarta font-medium tracking-wider text-white/85">
              [ 2025 ]
            </span>
            <div>
              <h3 className="text-[18px] leading-[1.2] font-medium text-white">
                Taught by{' '}
                <em className="font-serif italic font-normal text-white">
                  Industry
                </em>{' '}
                Professionals
              </h3>
              <p className="text-[11px] text-white/55 mt-2 leading-snug">
                Real-world mentors. No fluff — just the skills that get you
                hired.
              </p>
            </div>
          </div>
        </div>
      );
    }

    function HeroBackground({ videoRef }) {
      return (
        <>
          <video
            ref={videoRef}
            autoPlay
            muted
            loop
            playsInline
            preload="auto"
            className="absolute inset-0 w-full h-full object-cover opacity-60 z-0"
            aria-hidden="true"
          />
          {/* Left dark gradient */}
          <div
            className="absolute inset-0 z-[1] pointer-events-none"
            style={{
              background:
                'linear-gradient(90deg, #070b0a 0%, rgba(7,11,10,0.65) 30%, rgba(7,11,10,0) 70%)',
            }}
          />
          {/* Bottom-up gradient */}
          <div
            className="absolute inset-0 z-[2] pointer-events-none"
            style={{
              background:
                'linear-gradient(0deg, #070b0a 0%, rgba(7,11,10,0.55) 35%, rgba(7,11,10,0) 75%)',
            }}
          />
        </>
      );
    }

    function Hero() {
      const videoRef = useRef(null);
      const [menuOpen, setMenuOpen] = useState(false);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        let hls;
        if (Hls.isSupported()) {
          hls = new Hls({ enableWorker: false });
          hls.loadSource(HLS_SRC);
          hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = HLS_SRC;
        }

        return () => {
          if (hls) hls.destroy();
        };
      }, []);

      return (
        <section className="relative min-h-screen overflow-hidden grain">
          <HeroBackground videoRef={videoRef} />
          <GridLines />
          <CentralGlow />
          <Header onOpenMenu={() => setMenuOpen(true)} />

          <div className="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 pt-32 pb-20 text-center">
            <GlassCard />

            <p className="font-jakarta font-bold text-[11px] uppercase tracking-[0.22em] text-brand mb-5">
              Career-Ready Curriculum
            </p>

            <h1 className="font-sans font-extrabold uppercase tracking-tight leading-[0.95] text-[40px] sm:text-[52px] md:text-[60px] lg:text-[72px] max-w-4xl">
              Launch Your Coding Career
              <span className="text-brand">.</span>
            </h1>

            <p className="mt-6 text-[14px] text-white/70 max-w-[512px] leading-relaxed">
              Master in-demand coding skills through mentor-led projects,
              real-world challenges, and a portfolio that gets you hired by
              top engineering teams.
            </p>

            <a
              href="#"
              className="mt-10 inline-flex items-center gap-2 bg-brand text-ink font-bold uppercase tracking-wider rounded-full px-7 py-3.5 text-[14px] hover:scale-[1.02] active:scale-[0.99] transition-transform shadow-[0_0_40px_rgba(94,210,156,0.25)]"
            >
              Get Started
              <ArrowRight size={18} strokeWidth={2.5} />
            </a>
          </div>

          <MobileMenu open={menuOpen} onClose={() => setMenuOpen(false)} />
        </section>
      );
    }

    createRoot(document.getElementById('root')).render(<Hero />);
  </script>
</body>
</html>
